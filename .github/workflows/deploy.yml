name: Deploy Snake Claude → GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Blazor WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore dependencies
        run: dotnet restore SnakeClaude.csproj

      - name: Publish (static WASM)
        run: |
          dotnet publish SnakeClaude.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Ajustar base path para GitHub Pages
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo_name" == *.github.io ]]; then
            base_path="/"
            segment_count="0"
          else
            base_path="/${repo_name}/"
            segment_count="1"
          fi

          sed -i "s|<base href=\"/\" />|<base href=\"${base_path}\" />|" publish/wwwroot/index.html
          sed -i "s|var segmentCount = 0;|var segmentCount = ${segment_count};|" publish/wwwroot/404.html

          echo "Base path: ${base_path}"
          echo "SPA segment count: ${segment_count}"

      - name: Verificar base href
        # Repos *.github.io sao servidos na raiz; outros repos sao servidos em /nome-do-repo/.
        run: |
          test -f publish/wwwroot/index.html
          test -f publish/wwwroot/_framework/blazor.webassembly.js
          test -f publish/wwwroot/.nojekyll
          grep 'base href' publish/wwwroot/index.html

      - name: Upload artifact para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    name: Deploy para GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
