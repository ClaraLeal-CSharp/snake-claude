<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <title>Snake Claude</title>
    <!--
        GitHub Pages SPA fallback.
        Redireciona rotas desconhecidas para o index.html com o path na query string,
        o index.html então restaura o path correto para o Router do Blazor.
    -->
    <script>
        // Encode do path atual como query string e redireciona para o root
        var segmentCount = 0; // 0 = raiz do domínio, 1 = /nome-repo
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
</body>
</html>
